# Planned Kazakh SFT stage (roadmap item — no consumer script yet).
# Base model follows the pivot: QLoRA-continual-pretrained Qwen3-0.6B-Base.
base_model: checkpoints/qlora_qwen3-0.6b-base_100m
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
per_device_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_epochs: 3
max_seq_length: 2048
bf16: true
save_steps: 500
data_path: data/sft/instructions_kaz.jsonl
output_dir: checkpoints/qwen3-0.6b_sft_lora
