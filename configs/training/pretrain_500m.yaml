# Training config for KazLLM-500M on GCP a2-highgpu-1g (1× A100 40GB)
#
# Effective batch: 8 seqs × 4 grad_accum × 1 GPU = 32 seqs × 2048 tokens = 65K tokens/step
# Total steps for 9B tokens: 9B / 65K ≈ 138,000 steps
# Estimated wall time: ~3 days on 1× A100 40GB at ~100K tok/s/GPU
# Estimated cost: ~$3.67/hr spot × 72h ≈ $264 (spot) or ~$660 (on-demand)

defaults:
  - pretrain

total_tokens: 9_000_000_000
per_device_batch_size: 8
gradient_accumulation_steps: 4
context_length: 2048
learning_rate: 3.0e-4
min_lr_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 1.0
warmup_steps: 2000
bf16: true
gradient_checkpointing: true
fsdp: ""               # single GPU, no FSDP needed
save_steps: 2000
logging_steps: 10
eval_steps: 2000
seed: 42
checkpoint_dir: checkpoints/kaz500m_pretrain
