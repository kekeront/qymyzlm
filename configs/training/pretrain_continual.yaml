# Training config for QymyzLM-1.5B continual pretraining
#
# Base: Qwen-2.5-1.5B + Engram at layers {2, 7}
# Data: 9B Kazakh + 1B English (10% English to prevent catastrophic forgetting)
# Hardware: 1× A100 40GB spot (~$3.67/hr)
#
# Effective batch: 4 seqs × 8 grad_accum × 1 GPU × 2048 tokens = 65K tokens/step
# Total steps: 10B / 65K ≈ 154,000 steps
# Estimated wall time: ~28 hours at 100K tok/s
# Estimated cost: ~$103 (spot)

total_tokens: 10_000_000_000
per_device_batch_size: 4
gradient_accumulation_steps: 8
context_length: 2048
learning_rate: 1.5e-4          # half of from-scratch (Sherkala used 1.5e-4 for continual PT)
min_lr_ratio: 0.05
weight_decay: 0.1
max_grad_norm: 1.0
warmup_steps: 500              # shorter warmup for continual PT
bf16: true
gradient_checkpointing: true
fsdp: ""                       # single A100 40GB, no FSDP
save_steps: 2000
logging_steps: 10
eval_steps: 5000
seed: 42

# Data paths
tokenized_dir: data/tokenized/continual
english_tokenized_dir: data/tokenized/english
english_ratio: 0.1             # 10% English tokens to prevent forgetting

# Checkpoint
checkpoint_dir: checkpoints/qymyz1_5b_continual
continual_pt_checkpoint: checkpoints/qymyz1_5b_init  # output of build_continual_pt.py
resume_from_checkpoint: null
