defaults:
  - pretrain

total_tokens: 100_000_000     # 100M tokens for debug
per_device_batch_size: 2
gradient_accumulation_steps: 2
context_length: 1024           # shorter context for 8GB VRAM
max_steps: 1000
bf16: false                    # keep fp32 for debug correctness checks
gradient_checkpointing: true   # required on RTX 2070 even for 50M
fsdp: ""                       # no FSDP for single GPU
save_steps: 200
logging_steps: 1
checkpoint_dir: checkpoints/kaz50m_debug
