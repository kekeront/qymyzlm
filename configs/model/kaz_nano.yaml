# KazLLM-Nano — Deep-and-thin architecture for local RTX 2070 training
#
# ~43M backbone parameters (with weight tying) + ~6.4M Engram (sparse, zero FLOPs).
# Trains on RTX 2070 (8GB VRAM) with gradient checkpointing + fp32.
#
# Key design: deep-and-thin (MobileLLM / SmolLM2 insight).
# 24 layers at hidden=320 outperforms 12 layers at hidden=512 for same param count.
#
# Param breakdown (approximate):
#   Embeddings:  50K x 320                   = 16.0M (shared with LM head via tying)
#   24 layers x (attn ~0.31M + MLP ~0.83M)   = 27.3M
#   mHC overhead (n=2)                        =  ~0.01M
#   Engram dense projections (2 modules)      =  ~0.4M
#   -------------------------------------------
#   Total backbone (dense):  ~43.7M
#   Engram sparse tables:    ~6.4M (zero FLOPs; offloadable)
#   Weight tying saves:      16.0M (vs untied ~59.7M)

vocab_size: 50000
hidden_size: 320
intermediate_size: 864            # 8/3 x 320 = 853, rounded to multiple of 16
num_hidden_layers: 24
num_attention_heads: 10
num_key_value_heads: 5            # GQA 2:1
max_position_embeddings: 1024     # shorter context for local training
rope_theta: 500000.0
rms_norm_eps: 1.0e-5
tie_word_embeddings: true         # saves 16M params (critical for nano)
use_flash_attention: false        # RTX 2070 — use SDPA fallback

# mHC: 2 streams (lighter than 4 in 500M)
use_mhc: true
mhc_streams: 2

# Engram: small tables (50K slots x 32-dim, 2 heads per order)
use_engram: true
engram_layer_indices: [2, 6]      # inject at layers 2 and 6 (out of 24)
engram_ngram_orders: [2, 3]       # 2-gram and 3-gram Kazakh suffix patterns
engram_num_heads: 2               # 2 hash heads (vs 4 in 500M)
engram_table_size: 50021          # prime, ~50K entries
engram_slot_dim: 32               # half of production 64
engram_conv_kernel_size: 4

# MTP: Multi-Token Prediction (DeepSeek-V3 inspired)
use_mtp: true
mtp_depth: 1
mtp_lambda: 0.3
