# QymyzLM-1.5B: Continual PT from Qwen-2.5-1.5B + Engram
#
# This config is used with scripts/train_continual.py, NOT train.py.
# The model is built by scripts/build_continual_pt.py first.
#
# Architecture: Qwen-2.5-1.5B (28L, h=1536, 12H, 2KV) + Engram at layers {2, 7}
# Total params: ~1.5B base + ~512M Engram sparse = ~2B total, 1.5B active FLOPs

base_model: "Qwen/Qwen2.5-1.5B"

# Engram configuration (grafted onto Qwen, zero additional FLOPs)
use_engram: true
engram_layer_indices: [2, 7]
engram_ngram_orders: [2, 3]
engram_num_heads: 4
engram_table_size: 500003
engram_slot_dim: 64
engram_conv_kernel_size: 4

# Not used for continual PT (dropped from primary experiment)
use_mhc: false
use_mtp: false

# Vocab expansion
vocab_expansion:
  kazakh_tokenizer_path: "data/tokenizer/kaz_sp_unigram_50k/hf_tokenizer"
  max_new_tokens: 8000
  init_method: "mean_of_subwords"
