# KazLLM-50M Debug — RTX 2070 (8GB VRAM)
#
# Backbone ~50M params; Engram tables are tiny (10007 slots) — just validates
# the full v2 pipeline (mHC + Engram) end-to-end without spending GCP budget.
#
# Param breakdown (approximate):
#   Embeddings:  50K × 512          = 25.6M
#   6 layers × (attn ~0.79M + MLP ~2.1M + mHC ~0.02M) = 17.5M
#   LM head:     50K × 512          = 25.6M  (untied)
#   Engram dense projections (2 modules × ~0.1M)        =  0.2M
#   Engram sparse tables (2 × 4 tables × 10007 × 32)    =  2.6M sparse
#   ─────────────────────────────────────────────────────────────
#   Total backbone:  ~69M  (fits in 8GB with grad_checkpointing + bf16=false)

vocab_size: 50000
hidden_size: 512
intermediate_size: 1376          # ≈ 8/3 × 512, rounded to nearest 16
num_hidden_layers: 6
num_attention_heads: 8
num_key_value_heads: 4           # GQA 2:1
max_position_embeddings: 1024    # half of 500M; saves memory
rope_theta: 500000.0
rms_norm_eps: 1.0e-5
tie_word_embeddings: false
use_flash_attention: false       # RTX 2070 has FA2 via SDPA but skip for debug clarity

# mHC: 2 streams (vs 4 in 500M) — validates the code path, lower overhead
use_mhc: true
mhc_streams: 2

# Engram: tiny tables for speed (10007 slots ≈ 10K vs 500K in production)
use_engram: true
engram_layer_indices: [1, 3]
engram_ngram_orders: [2, 3]
engram_num_heads: 2
engram_table_size: 10007         # tiny prime; just validates hashing + retrieval
engram_slot_dim: 32              # half of production 64
engram_conv_kernel_size: 4
