# KazLLM-500M  — PRIMARY training target
#
# ~530M backbone parameters + ~512M Engram (sparse, zero FLOPs).
# Trains on 1× A100 40GB (GCP a2-highgpu-1g, ~$3.67/hr spot).
# 9B tokens gives ~17:1 token-to-param ratio — closer to Chinchilla than 1B.
#
# Architecture:
#   - 16 layers, hidden=1536, 12 attention heads / 6 KV heads (GQA 2:1)
#   - SwiGLU FFN: intermediate = 4096
#   - mHC n=4 streams (Manifold-Constrained Hyper-Connections)
#   - Engram at layers {2, 4}: {2,3}-gram memory, 4 hash heads, 500K slots × 64-dim
#   - RoPE theta=500K, context=4096

vocab_size: 50000
hidden_size: 1536
intermediate_size: 4096
num_hidden_layers: 16
num_attention_heads: 12
num_key_value_heads: 6
max_position_embeddings: 4096
rope_theta: 500000.0
rms_norm_eps: 1.0e-5
tie_word_embeddings: false
use_flash_attention: true

# mHC: n=4 parallel residual streams (Sinkhorn-Knopp stable)
use_mhc: true
mhc_streams: 4

# Engram N-gram memory
# Total sparse params: 2 modules × (2 orders × 4 heads) × 500K slots × 64 dim
#                    = 2 × 8 × 500K × 64 = 512M parameters (~1GB fp16)
# Zero additional FLOPs; can be offloaded to host RAM for inference.
use_engram: true
engram_layer_indices: [2, 4]       # inject at layer 2 and layer 4 (out of 16)
engram_ngram_orders: [2, 3]        # capture 2-gram and 3-gram Kazakh morpheme patterns
engram_num_heads: 4                # K hash heads per N-gram order
engram_table_size: 500003          # M slots (prime) — ~500K entries per table
engram_slot_dim: 64                # dimension per slot
engram_conv_kernel_size: 4         # depthwise causal conv kernel size

# MTP: Multi-Token Prediction (DeepSeek-V3 inspired, arXiv 2412.19437)
# Predicts D additional future tokens during training; discarded at inference.
# Adds ~39M params (7% of backbone) during training only.
use_mtp: true
mtp_depth: 1                       # D=1: predict 1 additional token (2 total)
mtp_lambda: 0.3                    # MTP loss weight; use forward curriculum for 500M:
                                   #   lambda=0 for first ~500M tokens (warmup)
                                   #   ramp to 0.3 over next ~500M tokens
                                   #   reduce to 0.1 after ~60% of training
                                   # (BabyLM ACL 2025: MTP can hurt <1B without curriculum)
