# KazLLM-1B  — research target
#
# ~1B backbone parameters + ~1B Engram (sparse, zero FLOPs).
# Requires 1× A100 80GB or 2× A100 40GB (GCP a2-highgpu-2g, ~$7.35/hr spot).

vocab_size: 50000
hidden_size: 2048
intermediate_size: 5504
num_hidden_layers: 22
num_attention_heads: 16
num_key_value_heads: 8
max_position_embeddings: 4096
rope_theta: 500000.0
rms_norm_eps: 1.0e-5
tie_word_embeddings: false
use_flash_attention: true

# mHC: n=4 parallel residual streams (Sinkhorn-Knopp stable)
use_mhc: true
mhc_streams: 4

# Engram N-gram memory
# 2 modules × 8 tables × 1M slots × 64-dim = 1B sparse params (~2GB fp16, zero FLOPs)
use_engram: true
engram_layer_indices: [2, 6]
engram_ngram_orders: [2, 3]
engram_num_heads: 4
engram_table_size: 1000003         # 1M slots (prime)
engram_slot_dim: 64
engram_conv_kernel_size: 4
